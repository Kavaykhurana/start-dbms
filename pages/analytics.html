<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Analytics | Startup Investment System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">VENTURE ANALYTICS</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="startups.html">Startups</a></li>
                <li><a href="recommendations.html">Recommendations</a></li>
                <li><a href="analytics.html" class="active">Analytics</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1>Advanced Analytics</h1>
            </header>

            <div class="charts-grid">
                <div class="glass-card" style="grid-column: span 2;">
                    <h3>CAC vs LTV (Efficiency Matrix)</h3>
                    <div style="height: 350px; margin-top: 20px;">
                        <canvas id="scatterChart"></canvas>
                    </div>
                </div>
                <div class="glass-card">
                    <h3>Burn Rate vs Runway</h3>
                    <div style="height: 350px; margin-top: 20px;">
                        <canvas id="burnRunwayChart"></canvas>
                    </div>
                </div>
                <div class="glass-card">
                    <h3>Sector Risk Comparison</h3>
                    <div style="height: 350px; margin-top: 20px;">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/charts.js"></script>
    <script type="module" src="../assets/js/analyticsPage.js"></script>
</body>
</html>
