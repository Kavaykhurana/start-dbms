<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">ER Diagram for Startup Investment Analysis and Decision System</title>
  <desc id="desc">Crow foot style ER diagram with eight tables, primary keys, foreign keys, and one-to-many relationships.</desc>
  <defs>
    <linearGradient id="cardFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#172231"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <style>
      .bg { fill: #070b12; }
      .grid { stroke: rgba(255,255,255,0.055); stroke-width: 1; }
      .entity { fill: url(#cardFill); stroke: rgba(0,210,255,0.52); stroke-width: 2; filter: url(#softShadow); }
      .entityAlt { fill: #121b28; stroke: rgba(0,255,136,0.48); stroke-width: 2; filter: url(#softShadow); }
      .entityWarn { fill: #151923; stroke: rgba(255,204,0,0.52); stroke-width: 2; filter: url(#softShadow); }
      .head { fill: rgba(0,210,255,0.12); stroke: rgba(0,210,255,0.28); stroke-width: 1; }
      .headAlt { fill: rgba(0,255,136,0.10); stroke: rgba(0,255,136,0.25); stroke-width: 1; }
      .headWarn { fill: rgba(255,204,0,0.10); stroke: rgba(255,204,0,0.25); stroke-width: 1; }
      .mainTitle { fill: #ffffff; font: 800 30px 'Poppins', 'Inter', Arial, sans-serif; }
      .note { fill: #aeb8c6; font: 500 14px 'Inter', Arial, sans-serif; }
      .tableTitle { fill: #ffffff; font: 800 18px 'Inter', Arial, sans-serif; letter-spacing: .5px; }
      .kind { fill: #93eaff; font: 800 11px 'Inter', Arial, sans-serif; letter-spacing: 1.2px; }
      .kindAlt { fill: #9bffd1; font: 800 11px 'Inter', Arial, sans-serif; letter-spacing: 1.2px; }
      .kindWarn { fill: #ffe58a; font: 800 11px 'Inter', Arial, sans-serif; letter-spacing: 1.2px; }
      .attr { fill: #dce7f3; font: 500 13px 'Inter', Arial, sans-serif; }
      .pk { fill: #00ff88; font: 900 12px 'Inter', Arial, sans-serif; }
      .fk { fill: #ffcc00; font: 900 12px 'Inter', Arial, sans-serif; }
      .uk { fill: #b388ff; font: 900 12px 'Inter', Arial, sans-serif; }
      .rel { stroke: #8fe9ff; stroke-width: 2.4; fill: none; }
      .relAlt { stroke: #9bffd1; stroke-width: 2.4; fill: none; }
      .relWarn { stroke: #ffe58a; stroke-width: 2.4; fill: none; }
      .label { fill: #ffffff; font: 900 13px 'Inter', Arial, sans-serif; }
      .relName { fill: #b9c4d2; font: 700 12px 'Inter', Arial, sans-serif; }
      .legendBox { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.14); stroke-width: 1; }
      .legendText { fill: #dce7f3; font: 700 13px 'Inter', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>
  <g opacity="0.85">
    <path class="grid" d="M0 75H1600M0 150H1600M0 225H1600M0 300H1600M0 375H1600M0 450H1600M0 525H1600M0 600H1600M0 675H1600M0 750H1600M0 825H1600M0 900H1600M0 975H1600"/>
    <path class="grid" d="M75 0V1050M150 0V1050M225 0V1050M300 0V1050M375 0V1050M450 0V1050M525 0V1050M600 0V1050M675 0V1050M750 0V1050M825 0V1050M900 0V1050M975 0V1050M1050 0V1050M1125 0V1050M1200 0V1050M1275 0V1050M1350 0V1050M1425 0V1050M1500 0V1050M1575 0V1050"/>
  </g>

  <text x="60" y="52" class="mainTitle">Startup Investment Analysis &amp; Decision System - ER Diagram</text>
  <text x="60" y="82" class="note">Clean 3NF/BCNF model: master tables + investment transaction table + time-series analytics tables.</text>

  <!-- Relationship connectors -->
  <g id="relationships">
    <!-- Sectors -> Startups -->
    <path class="rel" d="M330 202 H565"/>
    <text x="345" y="192" class="label">1</text>
    <text x="542" y="192" class="label">N</text>
    <text x="420" y="188" class="relName">classifies</text>

    <!-- Investors -> Investments -->
    <path class="relAlt" d="M1170 280 V382"/>
    <text x="1185" y="300" class="label">1</text>
    <text x="1185" y="370" class="label">N</text>
    <text x="1192" y="340" class="relName">funds</text>

    <!-- Startups -> Investments -->
    <path class="relAlt" d="M845 280 C900 320 925 360 965 430"/>
    <text x="858" y="300" class="label">1</text>
    <text x="942" y="415" class="label">N</text>
    <text x="885" y="358" class="relName">receives</text>

    <!-- Startups -> Financial Metrics -->
    <path class="rel" d="M660 330 V650 H215 V700"/>
    <text x="674" y="352" class="label">1</text>
    <text x="230" y="690" class="label">N</text>
    <text x="318" y="638" class="relName">reports monthly</text>

    <!-- Startups -> Market Data -->
    <path class="rel" d="M715 330 V700"/>
    <text x="730" y="352" class="label">1</text>
    <text x="730" y="690" class="label">N</text>
    <text x="733" y="575" class="relName">tracks</text>

    <!-- Startups -> Partnerships -->
    <path class="rel" d="M790 330 V650 H1020 V700"/>
    <text x="805" y="352" class="label">1</text>
    <text x="1035" y="690" class="label">N</text>
    <text x="860" y="638" class="relName">signs</text>

    <!-- Investments -> Risk Analysis -->
    <path class="relWarn" d="M1130 600 V650 H1410 V700"/>
    <text x="1145" y="620" class="label">1</text>
    <text x="1425" y="690" class="label">N</text>
    <text x="1215" y="640" class="relName">assessed by</text>
  </g>

  <!-- SECTORS -->
  <g transform="translate(60 125)">
    <rect class="entity" width="270" height="155" rx="14"/>
    <rect class="head" x="0" y="0" width="270" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">SECTORS</text>
    <text x="18" y="43" class="kind">MASTER / LOOKUP</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">sector_id</text>
    <text x="18" y="103" class="uk">UK</text><text x="52" y="103" class="attr">sector_name</text>
    <text x="52" y="128" class="attr">sector_description</text>
    <text x="52" y="150" class="attr">base_risk_score</text>
  </g>

  <!-- STARTUPS -->
  <g transform="translate(565 95)">
    <rect class="entity" width="330" height="235" rx="14"/>
    <rect class="head" x="0" y="0" width="330" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">STARTUPS</text>
    <text x="18" y="43" class="kind">COMPANY MASTER</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">startup_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">sector_id -> sectors</text>
    <text x="18" y="128" class="uk">UK</text><text x="52" y="128" class="attr">startup_name</text>
    <text x="52" y="153" class="attr">city, state, founding_year</text>
    <text x="52" y="178" class="attr">funding_stage</text>
    <text x="52" y="203" class="attr">annual_revenue_inr</text>
    <text x="52" y="225" class="attr">current_valuation_inr, equity_pct</text>
  </g>

  <!-- INVESTORS -->
  <g transform="translate(1030 125)">
    <rect class="entityAlt" width="285" height="155" rx="14"/>
    <rect class="headAlt" x="0" y="0" width="285" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">INVESTORS</text>
    <text x="18" y="43" class="kindAlt">FUNDING SOURCE</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">investor_id</text>
    <text x="18" y="103" class="uk">UK</text><text x="52" y="103" class="attr">investor_name, email</text>
    <text x="52" y="128" class="attr">investor_type, hq_city</text>
    <text x="52" y="150" class="attr">dry_powder_inr, risk_preference</text>
  </g>

  <!-- INVESTMENTS -->
  <g transform="translate(965 382)">
    <rect class="entityAlt" width="330" height="218" rx="14"/>
    <rect class="headAlt" x="0" y="0" width="330" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">INVESTMENTS</text>
    <text x="18" y="43" class="kindAlt">TRANSACTION / FACT</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">investment_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">investor_id -> investors</text>
    <text x="18" y="128" class="fk">FK</text><text x="52" y="128" class="attr">startup_id -> startups</text>
    <text x="52" y="153" class="attr">funding_round, security_type</text>
    <text x="52" y="178" class="attr">investment_date, amount</text>
    <text x="52" y="203" class="attr">equity_percentage, status</text>
  </g>

  <!-- FINANCIAL_METRICS -->
  <g transform="translate(60 700)">
    <rect class="entity" width="330" height="220" rx="14"/>
    <rect class="head" x="0" y="0" width="330" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">FINANCIAL_METRICS</text>
    <text x="18" y="43" class="kind">MONTHLY OPERATIONS</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">metric_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">startup_id -> startups</text>
    <text x="18" y="128" class="uk">UK</text><text x="52" y="128" class="attr">(startup_id, metric_month)</text>
    <text x="52" y="153" class="attr">revenue_inr, net_profit_inr</text>
    <text x="52" y="178" class="attr">CAC, LTV, burn_rate</text>
    <text x="52" y="203" class="attr">runway_months, churn_rate</text>
  </g>

  <!-- MARKET_DATA -->
  <g transform="translate(560 700)">
    <rect class="entity" width="315" height="180" rx="14"/>
    <rect class="head" x="0" y="0" width="315" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">MARKET_DATA</text>
    <text x="18" y="43" class="kind">EXTERNAL SIGNALS</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">market_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">startup_id -> startups</text>
    <text x="18" y="128" class="uk">UK</text><text x="52" y="128" class="attr">(startup_id, market_date)</text>
    <text x="52" y="153" class="attr">trend_value, competitor_score</text>
  </g>

  <!-- PARTNERSHIPS -->
  <g transform="translate(930 700)">
    <rect class="entity" width="315" height="180" rx="14"/>
    <rect class="head" x="0" y="0" width="315" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">PARTNERSHIPS</text>
    <text x="18" y="43" class="kind">COMMERCIAL PROOF</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">partner_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">startup_id -> startups</text>
    <text x="52" y="128" class="attr">partner_name</text>
    <text x="52" y="153" class="attr">deal_type, impact_score</text>
  </g>

  <!-- RISK_ANALYSIS -->
  <g transform="translate(1260 700)">
    <rect class="entityWarn" width="300" height="190" rx="14"/>
    <rect class="headWarn" x="0" y="0" width="300" height="52" rx="14"/>
    <text x="18" y="25" class="tableTitle">RISK_ANALYSIS</text>
    <text x="18" y="43" class="kindWarn">RISK SNAPSHOTS</text>
    <text x="18" y="78" class="pk">PK</text><text x="52" y="78" class="attr">risk_id</text>
    <text x="18" y="103" class="fk">FK</text><text x="52" y="103" class="attr">investment_id -> investments</text>
    <text x="18" y="128" class="uk">UK</text><text x="52" y="128" class="attr">(investment_id, assessment_date)</text>
    <text x="52" y="153" class="attr">risk_score</text>
    <text x="52" y="176" class="attr">factors</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60 960)">
    <rect class="legendBox" width="840" height="54" rx="12"/>
    <text x="18" y="23" class="legendText">Legend: PK = Primary Key, FK = Foreign Key, UK = Unique Key, 1:N = one parent row can have many child rows.</text>
    <text x="18" y="43" class="legendText">Main many-to-many business relationship is Investor to Startup, resolved through the Investments transaction table.</text>
  </g>
</svg>
